{% extends "base.html" %}

<article style="margin-top:1.5rem; text-align:center; padding:1.5rem">
  <h3 style="margin:0 0 0.5rem">🪙 Token 用量监控</h3>
  <p class="muted">Qwen / Qoder SDK 用量统计、趋势图表、月度账单</p>
  <a href="/admin/cost" role="button" style="margin-top:0.5rem">打开仪表盘 →</a>
</article>
<script>
(function() {
  let chart = null;
  let dataCache = null;
  let currentPeriod = 'intraday';

  function fmtInt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
    return String(n);
  }

  async function loadData() {
    const model = document.getElementById('model-select').value;
    const resp = await fetch(`/admin/api/token-usage?model=${model}`);
    if (!resp.ok) { console.error('failed:', resp.status); return; }
    dataCache = await resp.json();
    renderHeadlines();
    renderChart(currentPeriod);
  }

  function renderHeadlines() {
    if (!dataCache) return;
    const t = dataCache.today, m = dataCache.this_month;
    document.getElementById('today-calls').textContent = t.calls;
    document.getElementById('today-input').textContent = fmtInt(t.input);
    document.getElementById('today-output').textContent = fmtInt(t.output);
    document.getElementById('today-credits').textContent = t.credits.toFixed(1);
    document.getElementById('month-calls').textContent = m.calls;
    document.getElementById('month-input').textContent = fmtInt(m.input);
    document.getElementById('month-output').textContent = fmtInt(m.output);
    document.getElementById('month-credits').textContent = m.credits.toFixed(1);
    document.getElementById('month-range').textContent = m.range;
  }

  function renderChart(period) {
    if (!dataCache) return;
    const series = dataCache[period];
    const labels = series.map(s => s.label);
    const credits = series.map(s => s.credits);
    const calls = series.map(s => s.calls);

    if (chart) chart.destroy();
    const ctx = document.getElementById('token-chart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Credits',
            data: credits,
            borderColor: '#4caf50',
            backgroundColor: 'rgba(76, 175, 80, 0.15)',
            fill: true,
            tension: 0.3,
            yAxisID: 'y',
            pointRadius: 3,
          },
          {
            label: 'LLM 调用次数',
            data: calls,
            borderColor: '#ff9800',
            backgroundColor: 'rgba(255, 152, 0, 0.05)',
            borderDash: [5, 5],
            tension: 0.3,
            yAxisID: 'y1',
            pointRadius: 2,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {mode: 'index', intersect: false},
        scales: {
          y: {
            type: 'linear', position: 'left',
            title: {display: true, text: 'Credits'},
            beginAtZero: true,
          },
          y1: {
            type: 'linear', position: 'right',
            title: {display: true, text: '调用次数'},
            beginAtZero: true,
            grid: {drawOnChartArea: false},
          },
        },
        plugins: {
          legend: {position: 'top'},
          tooltip: {
            callbacks: {
              afterTitle: (items) => {
                const idx = items[0].dataIndex;
                const s = series[idx];
                return `输入: ${fmtInt(s.input)} | 输出: ${fmtInt(s.output)}`;
              }
            }
          }
        }
      }
    });
  }

  // Period buttons
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.add('secondary', 'outline');
    btn.style.cssText = 'padding:0.3rem 0.8rem; font-size:0.82rem; margin:0; width:auto';
    btn.addEventListener('click', () => {
      currentPeriod = btn.dataset.period;
      document.querySelectorAll('.period-btn').forEach(b => {
        b.classList.add('outline');
      });
      btn.classList.remove('outline');
      renderChart(currentPeriod);
    });
  });
  document.querySelector('.period-btn[data-period="intraday"]').classList.remove('outline');

  // Model selector (button group)
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('model-select').value = btn.dataset.model;
      loadData();
      loadMonthlyReports();
    });
  });

  // Manual refresh
  document.getElementById('refresh-btn').addEventListener('click', async () => {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true; btn.textContent = '刷新中…';
    await fetch('/admin/api/token-usage/refresh', {method: 'POST'});
    await loadData();
    btn.disabled = false; btn.textContent = '手动刷新';
  });

  // Initial load
  loadData();
})();
</script>


<!-- Monthly Reports Archive ===================================== -->
<article id="monthly-archive" style="margin-top:1.5rem">
  <header>
    <strong>📅 月度账单归档</strong>
    <small class="muted" style="margin-left:0.6rem">按计费周期（每月 27 日）归档 · 默认折叠</small>
  </header>
  <div id="monthly-list" style="margin-top:0.8rem">
    <p class="muted">加载中…</p>
  </div>
</article>

<style>
/* Model selector — prominent button group */
.model-selector {
  margin-top: 1rem;
  padding: 0.8rem;
  background: linear-gradient(135deg, #f8f9ff 0%, #fff 100%);
  border: 1px solid #e0e3ed;
  border-radius: 10px;
}
.model-selector-label {
  display: block;
  margin: 0 0 0.6rem;
  font-weight: bold;
  font-size: 0.9rem;
  color: #555;
}
.model-btn-group {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.6rem;
}
.model-btn {
  background: #fff;
  border: 2px solid #e0e3ed;
  border-radius: 8px;
  padding: 0.7rem 0.8rem;
  cursor: pointer;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  margin: 0;
  width: 100%;
  transition: all 0.15s;
  color: #333;
}
.model-btn:hover {
  border-color: #5b8dee;
  background: #f4f8ff;
}
.model-btn.active {
  border-color: #2962ff;
  background: linear-gradient(135deg, #2962ff 0%, #1e88e5 100%);
  color: #fff;
  box-shadow: 0 3px 12px rgba(41,98,255,0.25);
  transform: translateY(-1px);
}
.model-btn .model-name {
  font-size: 0.95rem;
  font-weight: bold;
}
.model-btn .model-tier {
  font-size: 0.72rem;
  opacity: 0.7;
}
.model-btn .model-price {
  font-size: 0.72rem;
  opacity: 0.85;
  margin-top: 0.1rem;
  font-family: monospace;
}

/* Monthly reports */
.monthly-card {
  border: 1px solid #e0e3ed;
  border-radius: 8px;
  margin-bottom: 0.6rem;
  overflow: hidden;
}
.monthly-card details {
  margin: 0;
}
.monthly-card summary {
  padding: 0.7rem 1rem;
  background: #f8f9fa;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  list-style: none;
}
.monthly-card summary::-webkit-details-marker { display: none; }
.monthly-card summary::after {
  content: "▼";
  font-size: 0.7rem;
  color: #888;
  transition: transform 0.2s;
}
.monthly-card details[open] summary::after { transform: rotate(180deg); }
.monthly-card summary:hover { background: #f0f2f5; }
.monthly-summary-info { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
.month-range { font-weight: bold; }
.month-status { font-size: 0.78rem; padding: 0.15rem 0.5rem; border-radius: 4px; }
.month-status-in_progress { background: #fff3e0; color: #e65100; }
.month-status-complete { background: #e8f5e9; color: #2e7d32; }
.month-status-partial_data { background: #ffebee; color: #c62828; }
.month-quick-stat { font-size: 0.82rem; color: #555; }
.monthly-content {
  padding: 1rem 1.2rem;
  background: #fff;
  border-top: 1px solid #f0f0f0;
}
.monthly-content h1, .monthly-content h2, .monthly-content h3 {
  margin: 0.8rem 0 0.4rem;
  font-size: 1rem;
}
.monthly-content h1 { font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
.monthly-content table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 0.5rem 0; }
.monthly-content th, .monthly-content td { padding: 0.4rem 0.7rem; border-bottom: 1px solid #eee; text-align: left; }
.monthly-content th { background: #f8f9fa; font-weight: 600; }
.monthly-content code { font-family: monospace; background: #f4f4f4; padding: 0.1rem 0.3rem; border-radius: 3px; }
.monthly-content ul { margin: 0.4rem 0; padding-left: 1.4rem; }
.monthly-content li { margin: 0.2rem 0; font-size: 0.85rem; }
</style>

<script src="/static/vendor/marked.min.js"></script>
<script>
(function() {
  async function loadMonthlyReports() {
    const resp = await fetch('/admin/api/monthly-reports');
    if (!resp.ok) return;
    const reports = await resp.json();
    const container = document.getElementById('monthly-list');
    if (!reports || reports.length === 0) {
      container.innerHTML = '<p class="muted">暂无月度数据。</p>';
      return;
    }
    container.innerHTML = '';
    reports.forEach((r, idx) => {
      const card = document.createElement('div');
      card.className = 'monthly-card';
      const recCredits = r.recommendation.recommended
        ? `推荐 ${r.recommendation.recommended.model} (${r.recommendation.recommended.credits.toFixed(0)} cr)`
        : '无可负担模型';
      // First card (current month) open by default
      const openAttr = idx === 0 ? 'open' : '';
      card.innerHTML = `
        <details ${openAttr}>
          <summary>
            <div class="monthly-summary-info">
              <span class="month-range">${r.cycle_start} ~ ${r.cycle_end}</span>
              <span class="month-status month-status-${r.status}">
                ${r.status === 'in_progress' ? '⏳ 进行中' :
                  r.status === 'complete' ? '✅ 已结束' : '⚠️ 部分数据'}
              </span>
              <span class="month-quick-stat">${r.totals.calls} 次调用</span>
              <span class="month-quick-stat">${recCredits}</span>
            </div>
          </summary>
          <div class="monthly-content">${marked.parse(r.markdown)}</div>
        </details>
      `;
      container.appendChild(card);
    });
  }
  // Expose globally so model change can refresh
  window.loadMonthlyReports = loadMonthlyReports;
  loadMonthlyReports();
})();
</script>

{% endblock %}
