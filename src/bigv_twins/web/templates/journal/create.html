{% extends "base.html" %}
{% block title %}新建决策记录 · 赛博大V{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ul>
    <li><a href="/journal">← 决策日志</a></li>
    <li>新建记录</li>
  </ul>
</nav>

<h2>📝 记录投资决策</h2>
<p class="muted" style="margin-top:-0.5rem; margin-bottom:1.5rem">
  记录你的决策逻辑和操作计划。系统自动补充市场快照——将来复盘时一目了然。
</p>

<form method="post" action="/journal/new" class="journal-form">
  <!-- Section 1: 标的 + 操作 -->
  <fieldset>
    <legend>标的与操作</legend>
    <div class="form-row">
      <label>
        股票代码 *
        <input type="text" name="ticker" value="{{ prefill_ticker }}" required placeholder="如 601088" maxlength="10">
      </label>
      <label>
        股票名称 *
        <input type="text" name="ticker_name" value="{{ prefill_name }}" required placeholder="如 中国神华">
      </label>
    </div>
    <div class="form-row">
      <label>
        操作类型 *
        <select name="action" required id="action-select">
          <option value="open">建仓（首次买入）</option>
          <option value="add">加仓</option>
          <option value="reduce">减仓</option>
          <option value="close">清仓（全部卖出）</option>
          <option value="retroactive">补录（已持有，录入历史仓位）</option>
        </select>
      </label>
      <label id="price-label">
        <span id="price-label-text">决策时价格</span>
        <input type="number" name="price_at_decision" step="0.01" placeholder="当前/成本价">
      </label>
      <label>
        操作数量（股）
        <input type="number" name="shares" step="1" min="0" placeholder="如 5000">
      </label>
    </div>
  </fieldset>

  <!-- Section 2: 决策逻辑 -->
  <fieldset>
    <legend>决策逻辑</legend>
    <label>
      核心理由 * <small class="muted">（为什么做这个决策？）</small>
      <textarea name="reasoning" rows="4" required placeholder="例如：煤价底部企稳，当前 PE 仅 9 倍处于历史低位，股息率 5.8% 提供安全垫。煤化工转型带来额外增长预期。"></textarea>
    </label>
    <label>
      操作计划 <small class="muted">（后续打算怎么操作：什么时候加仓/减仓/清仓离场）</small>
      <textarea name="action_plan" rows="3" placeholder="例如：计划分 3 次建仓，当前先买 1/3；PE 到 8 以下再加第二笔；如果跌破 28 元止损清仓。半年后评估是否继续持有。"></textarea>
    </label>
  </fieldset>

  <!-- Section 3: 预设 -->
  <fieldset>
    <legend>目标与预设（选填）</legend>
    <div class="form-row">
      <label>
        目标价
        <input type="number" name="target_price" step="0.01" placeholder="到达后考虑卖出">
      </label>
      <label>
        止损价
        <input type="number" name="stop_loss_price" step="0.01" placeholder="跌到这里止损">
      </label>
    </div>
    <div class="form-row">
      <label>
        预期持有时间
        <select name="expected_hold_period">
          <option value="">-- 选择 --</option>
          <option value="1month">1 个月</option>
          <option value="3months">3 个月</option>
          <option value="6months">6 个月</option>
          <option value="1year">1 年</option>
          <option value="3years">3 年以上</option>
        </select>
      </label>
      <label>
        如果跌 10% 我会
        <select name="if_drop_10pct">
          <option value="">-- 选择 --</option>
          <option value="add">加仓</option>
          <option value="hold">持有不动</option>
          <option value="stop">止损</option>
          <option value="review">重新评估</option>
        </select>
      </label>
    </div>
  </fieldset>

  <button type="submit" style="width:100%">保存决策记录</button>
  <small class="muted" style="display:block; text-align:center; margin-top:0.5rem">
    保存后系统将在后台自动补充市场环境快照（PE/PB/市值/博主观点）
  </small>
</form>

<script>
document.getElementById('action-select').addEventListener('change', function() {
  const label = document.getElementById('price-label-text');
  if (this.value === 'retroactive') {
    label.textContent = '当前持仓成本价';
  } else if (this.value === 'close') {
    label.textContent = '卖出价格';
  } else {
    label.textContent = '买入价格';
  }
});
</script>

<style>
.journal-form fieldset { margin-bottom:1.5rem; }
.journal-form legend { font-weight:bold; font-size:1rem; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:1rem; }
.journal-form textarea { font-size:0.9rem; }
</style>
{% endblock %}
