{% extends "base.html" %}
{% block title %}新建决策记录 · 赛博大V{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ul>
    <li><a href="/journal">← 决策日志</a></li>
    <li>新建记录</li>
  </ul>
</nav>

<h2>📝 记录投资决策</h2>
<p class="muted" style="margin-top:-0.5rem; margin-bottom:1.5rem">
  记录你的操作和决策逻辑。系统自动补充市场快照，自动加入自选股。
</p>

<form method="post" action="/journal/new" class="journal-form">
  <fieldset>
    <legend>标的与操作</legend>
    <div class="form-row">
      <label>
        股票代码 *
        <input type="text" name="ticker" value="{{ prefill_ticker }}" required placeholder="如 601088 或 510300" maxlength="10">
      </label>
      <label>
        股票名称 *
        <input type="text" name="ticker_name" value="{{ prefill_name }}" required placeholder="如 中国神华">
      </label>
    </div>
    <div class="form-row">
      <label>
        操作类型 *
        <select name="action" required id="action-select">
          <option value="open">建仓（首次买入）</option>
          <option value="add">加仓</option>
          <option value="reduce">减仓</option>
          <option value="close">清仓（全部卖出）</option>
          <option value="retroactive">补录（已持有，录入历史仓位）</option>
        </select>
      </label>
      <label>
        <span id="price-label">买入价格</span>
        <input type="number" name="price_at_decision" step="0.001" placeholder="操作实时价格">
      </label>
      <label>
        <span id="shares-label">操作数量（股）</span>
        <input type="number" name="shares" step="1" min="0" placeholder="如 5000">
      </label>
    </div>
  </fieldset>

  <fieldset>
    <legend>决策逻辑</legend>
    <label>
      核心理由 * <small class="muted">（为什么做这个操作？）</small>
      <textarea name="reasoning" rows="4" required placeholder="例如：煤价底部企稳，当前 PE 仅 9 倍处于历史低位，股息率 5.8% 提供安全垫。"></textarea>
    </label>
    <label>
      操作计划 <small class="muted">（后续什么时候加仓/减仓/清仓离场）</small>
      <textarea name="action_plan" rows="3" placeholder="例如：计划分 3 次建仓，当前先买 1/3；PE 到 8 以下再加；跌破 28 元清仓。半年后 PE>15 减仓一半。"></textarea>
    </label>
  </fieldset>

  <fieldset>
    <legend>目标与预设（选填）</legend>
    <div class="form-row">
      <label>
        目标价
        <input type="number" name="target_price" step="0.01" placeholder="到达后考虑卖出">
      </label>
      <label>
        止损价
        <input type="number" name="stop_loss_price" step="0.01" placeholder="跌到这里止损">
      </label>
    </div>
    <div class="form-row">
      <label>
        预期持有时间
        <select name="expected_hold_period">
          <option value="">-- 选择 --</option>
          <option value="1month">1 个月</option>
          <option value="3months">3 个月</option>
          <option value="6months">6 个月</option>
          <option value="1year">1 年</option>
          <option value="3years">3 年以上</option>
        </select>
      </label>
      <label>
        如果跌 10%
        <select name="if_drop_10pct">
          <option value="">-- 选择 --</option>
          <option value="add">加仓</option>
          <option value="hold">持有不动</option>
          <option value="stop">止损</option>
          <option value="review">重新评估</option>
        </select>
      </label>
    </div>
  </fieldset>

  <button type="submit" style="width:100%">保存决策记录</button>
</form>

<script>
const sel = document.getElementById('action-select');
const priceLabel = document.getElementById('price-label');
const sharesLabel = document.getElementById('shares-label');
sel.addEventListener('change', function() {
  switch(this.value) {
    case 'open': case 'add':
      priceLabel.textContent = '买入价格'; sharesLabel.textContent = '操作数量（股）'; break;
    case 'reduce': case 'close':
      priceLabel.textContent = '卖出价格'; sharesLabel.textContent = '操作数量（股）'; break;
    case 'retroactive':
      priceLabel.textContent = '当前持仓成本价'; sharesLabel.textContent = '持有数量（股）'; break;
  }
});
</script>

<style>
.journal-form fieldset { margin-bottom:1.5rem; }
.journal-form legend { font-weight:bold; font-size:1rem; }
.form-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:1rem; }
</style>
{% endblock %}
